# Azure deployment configuration
name: norwegian-board-network
metadata:
  template: norwegian-board-network@0.0.1
infra:
  provider: bicep
  path: ./infra
services:
  backend:
    project: ./backend
    language: ts
    host: containerapp
    docker:
      path: ./backend/Dockerfile
  frontend:
    project: ./frontend
    language: ts
    host: containerapp
    docker:
      path: ./frontend/Dockerfile
    dist: dist
