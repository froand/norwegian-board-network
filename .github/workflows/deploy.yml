name: Deploy to Azure Container Apps

on:
  push:
    branches: [master]

env:
  ACR_NAME: YOUR_ACR_NAME
  RESOURCE_GROUP: norwegian-board-network
  BACKEND_APP: YOUR_BACKEND_APP
  FRONTEND_APP: YOUR_FRONTEND_APP
  BACKEND_IMAGE: YOUR_ACR_NAME.azurecr.io/norsk-nettverk-backend:latest
  FRONTEND_IMAGE: YOUR_ACR_NAME.azurecr.io/norsk-nettverk-frontend:latest
  VITE_API_URL: https://YOUR_BACKEND_APP.YOUR_APP_ENV.swedencentral.azurecontainerapps.io

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push backend image
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image norsk-nettverk-backend:latest \
            --file backend/Dockerfile \
            backend/

      - name: Deploy backend
        run: |
          SUFFIX="v$(date +%Y%m%d%H%M%S)"
          az containerapp update \
            --name ${{ env.BACKEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.BACKEND_IMAGE }} \
            --revision-suffix $SUFFIX

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push frontend image
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image norsk-nettverk-frontend:latest \
            --build-arg VITE_API_URL=${{ env.VITE_API_URL }} \
            --file frontend/Dockerfile \
            frontend/

      - name: Deploy frontend
        run: |
          SUFFIX="v$(date +%Y%m%d%H%M%S)"
          az containerapp update \
            --name ${{ env.FRONTEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.FRONTEND_IMAGE }} \
            --revision-suffix $SUFFIX
