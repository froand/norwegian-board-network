name: Deploy to Azure Container Apps

on:
  push:
    branches: [master]

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
  BACKEND_APP: ${{ vars.BACKEND_APP }}
  FRONTEND_APP: ${{ vars.FRONTEND_APP }}
  BACKEND_IMAGE: ${{ vars.ACR_NAME }}.azurecr.io/norsk-nettverk-backend:latest
  FRONTEND_IMAGE: ${{ vars.ACR_NAME }}.azurecr.io/norsk-nettverk-frontend:latest
  VITE_API_URL: ${{ vars.VITE_API_URL }}

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push backend image
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image norsk-nettverk-backend:latest \
            --file backend/Dockerfile \
            backend/

      - name: Deploy backend
        run: |
          SUFFIX="v$(date +%Y%m%d%H%M%S)"
          az containerapp update \
            --name ${{ env.BACKEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.BACKEND_IMAGE }} \
            --revision-suffix $SUFFIX

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create .env.production for Vite build
        run: |
          echo "VITE_API_URL=${{ vars.VITE_API_URL }}" > frontend/.env.production
          echo "VITE_APPINSIGHTS_CONNECTION_STRING=${{ secrets.APPINSIGHTS_CONNECTION_STRING }}" >> frontend/.env.production

      - name: Mirror frontend base images into ACR
        run: |
          az acr import \
            --name ${{ env.ACR_NAME }} \
            --source docker.io/library/node:20-alpine \
            --image cache/node:20-alpine \
            --force
          az acr import \
            --name ${{ env.ACR_NAME }} \
            --source docker.io/library/nginx:alpine \
            --image cache/nginx:alpine \
            --force

      - name: Build and push frontend image
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image norsk-nettverk-frontend:latest \
            --build-arg NODE_BASE_IMAGE=${{ env.ACR_NAME }}.azurecr.io/cache/node:20-alpine \
            --build-arg NGINX_BASE_IMAGE=${{ env.ACR_NAME }}.azurecr.io/cache/nginx:alpine \
            --file frontend/Dockerfile \
            frontend/

      - name: Deploy frontend
        run: |
          SUFFIX="v$(date +%Y%m%d%H%M%S)"
          az containerapp update \
            --name ${{ env.FRONTEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.FRONTEND_IMAGE }} \
            --revision-suffix $SUFFIX
