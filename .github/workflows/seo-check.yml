name: SEO checks

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  seo-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # Build the production configuration so canonical/robots reflect prod.
      VITE_SITE_URL: https://www.norsknettverk.com
      VITE_ALLOW_INDEXING: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run SEO checks
        run: npm run seo:check
