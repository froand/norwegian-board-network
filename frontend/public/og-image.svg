<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Norsk Nettverk – styre, makt og interessekonflikter">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1a2e"/>
      <stop offset="1" stop-color="#2d2d44"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Stortinget red accent bar -->
  <rect width="1200" height="12" fill="#cf0a2c"/>

  <!-- Decorative network graph -->
  <g stroke="#818cf8" stroke-width="2" opacity="0.35">
    <line x1="880" y1="150" x2="1010" y2="230"/>
    <line x1="1010" y1="230" x2="960" y2="380"/>
    <line x1="960" y1="380" x2="820" y2="430"/>
    <line x1="820" y1="430" x2="740" y2="300"/>
    <line x1="740" y1="300" x2="880" y2="150"/>
    <line x1="1010" y1="230" x2="1110" y2="360"/>
    <line x1="740" y1="300" x2="880" y2="150"/>
    <line x1="960" y1="380" x2="1110" y2="360"/>
  </g>
  <g>
    <circle cx="880" cy="150" r="16" fill="#4f8cff"/>
    <circle cx="1010" cy="230" r="20" fill="#34c759"/>
    <circle cx="960" cy="380" r="14" fill="#cf0a2c"/>
    <circle cx="820" cy="430" r="18" fill="#f0a020"/>
    <circle cx="740" cy="300" r="13" fill="#4f8cff"/>
    <circle cx="1110" cy="360" r="15" fill="#34c759"/>
  </g>

  <!-- Wordmark -->
  <text x="90" y="250" font-family="Georgia, 'Times New Roman', serif" font-size="86" font-weight="700" fill="#ffffff">Norsk Nettverk</text>
  <text x="92" y="320" font-family="Arial, Helvetica, sans-serif" font-size="38" fill="#c9c9dd">Styre, makt og interessekonflikter</text>

  <!-- Description -->
  <text x="92" y="410" font-family="Arial, Helvetica, sans-serif" font-size="27" fill="#9090a8">Interaktiv graf over norske politikere, styreverv og selskaper</text>
  <text x="92" y="448" font-family="Arial, Helvetica, sans-serif" font-size="27" fill="#9090a8">basert på åpne data fra Stortinget og Brønnøysundregistrene.</text>

  <!-- Domain -->
  <text x="92" y="560" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#cf0a2c">www.norsknettverk.com</text>
</svg>
