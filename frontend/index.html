  <body>
    <div id="root"></div>

    <!-- Crawlable fallback for engines that do not execute JavaScript.
         Mirrors the app's real purpose and data sources; no invented content. -->
    <noscript>
      <main>
        <h1>Norsk Nettverk – styre, makt og interessekonflikter</h1>
        <p>
          Norsk Nettverk er et interaktivt verktøy som visualiserer forbindelser
          mellom norske politikere, styreverv og selskaper. Målet er å gjøre det
          enklere å utforske mulige interessekonflikter og såkalte svingdør-mønstre
          i norsk politikk og næringsliv.
        </p>
        <p>Dataene bygger på offentlig tilgjengelige kilder:</p>
        <ul>
          <li>Stortinget (representanter, komiteer, partier og høringsinnspill)</li>
          <li>Brønnøysundregistrene (selskaper, styreroller og eierskap)</li>
          <li>regjeringen.no (statsråder og departementer)</li>
          <li>Wikidata (posisjonshistorikk for politikere)</li>
        </ul>
        <p>
          Verktøyet krever JavaScript for den interaktive grafen. Kildekoden er
          åpen og tilgjengelig på
          <a href="https://github.com/froand/norwegian-board-network">GitHub</a>.
        </p>
      </main>
    </noscript>

    <script type="module" src="/src/main.tsx"></script>
